    <title>Ambady Dileep | Full-Stack Developer</title>
    <script>
      (function () {
        var k = 'portfolio-theme';
        var t = localStorage.getItem(k);
        if (t !== 'light' && t !== 'dark') {
          t = 'dark';
        }
        document.documentElement.classList.add(t);
      })();
    </script>
    <style>
      .loader-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #030712;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      html.light .loader-container {
        background-color: #f8fafc;
      }
      .loader-spinner {
        width: 38px;
        height: 38px;
        border: 2px solid rgba(37, 99, 235, 0.15);
        border-top-color: #2563EB;
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
        will-change: transform;
      }
      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loader" class="loader-container">
      <div class="loader-spinner"></div>
    </div>
    <script>
      (function () {
        var loader = document.getElementById('loader');
        if (!loader) return;
        var hidden = false;
        function hide() {
          if (hidden) return;
          hidden = true;
          loader.style.opacity = '0';
          loader.style.visibility = 'hidden';
          setTimeout(function () {
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 450);
        }
        document.addEventListener('app-ready', hide);
        setTimeout(hide, 2000);
      })();
    </script>
    <a
      href="#hero"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[200] focus:px-4 focus:py-2 focus:bg-[#2563EB] focus:text-white focus:rounded-lg focus:text-sm focus:font-semibold"
    >
      Skip to content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
